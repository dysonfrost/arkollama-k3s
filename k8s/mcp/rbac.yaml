apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-sa
  namespace: mcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-server-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status", "events", "nodes", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-server-cluster-role-binding
subjects:
- kind: ServiceAccount
  name: mcp-server-sa
  namespace: mcp-system
roleRef:
  kind: ClusterRole
  name: mcp-server-cluster-role
  apiGroup: rbac.authorization.k8s.io
