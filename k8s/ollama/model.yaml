apiVersion: ollama.ayaka.io/v1
kind: Model
metadata:
  name: hermes-model
  namespace: ollama-system
spec:
  image: herman/hermes-3:8b-q4_K_M
  replicas: 1
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      memory: "4Gi"
      cpu: "2"
    limits:
      memory: "6Gi"
      cpu: "4"
  # Optional: specify a storage class (k3s default is local-path)
  storageClassName: local-path
  persistentVolume:
    accessMode: ReadWriteOnce
