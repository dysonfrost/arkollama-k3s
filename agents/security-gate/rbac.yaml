apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-gate-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: security-gate-role
rules:
- apiGroups: [""]
  resources: ["pods", "namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: security-gate-binding
subjects:
- kind: ServiceAccount
  name: security-gate-sa
roleRef:
  kind: Role
  name: security-gate-role
  apiGroup: rbac.authorization.k8s.io
