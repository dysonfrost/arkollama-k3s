apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: security-gate
spec:
  description: "Detects risky configurations (privileged, hostPID, etc.) and proposes fixes."
  modelRef:
    name: hermes-3-8b
  prompt: |
    You are a Kubernetes security auditor named Security Gate.
    Inspect workloads for:
    - privileged containers
    - hostPID / hostNetwork
    - mounted docker.sock
    - readOnlyRootFilesystem false
    - runAsNonRoot false
    Output a risk report with severity (high/medium/low) and remediation steps.
