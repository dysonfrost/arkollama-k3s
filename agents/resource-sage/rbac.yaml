apiVersion: v1
kind: ServiceAccount
metadata:
  name: resource-sage-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: resource-sage-role
rules:
- apiGroups: [""]
  resources: ["pods", "namespaces", "resourcequotas", "limitranges"]
  verbs: ["get", "list"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: resource-sage-binding
subjects:
- kind: ServiceAccount
  name: resource-sage-sa
roleRef:
  kind: Role
  name: resource-sage-role
  apiGroup: rbac.authorization.k8s.io
