apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-doctor-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-doctor-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/status", "events"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-doctor-binding
subjects:
- kind: ServiceAccount
  name: pod-doctor-sa
roleRef:
  kind: Role
  name: pod-doctor-role
  apiGroup: rbac.authorization.k8s.io
